name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @careerscout/web lint
      - run: pnpm --filter @careerscout/web build

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, scheduler, ai-engine]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --directory apps/${{ matrix.service }}
      - run: uv run --directory apps/${{ matrix.service }} python -m compileall app
