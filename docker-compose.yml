services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - careerscout_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ai-engine
    networks:
      - careerscout_net

  scraper-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ai-engine
    networks:
      - careerscout_net

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - api
    networks:
      - careerscout_net

  ai-engine:
    build:
      context: .
      dockerfile: apps/ai-engine/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - careerscout_net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - careerscout_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - careerscout_net

  nginx:
    build:
      context: .
      dockerfile: infrastructure/nginx/Dockerfile
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
    networks:
      - careerscout_net

volumes:
  postgres_data:

networks:
  careerscout_net:
    driver: bridge
